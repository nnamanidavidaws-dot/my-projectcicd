name: Myproject CICD

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          Distribution: 'temurin'
          Java-version: '17'

      - name: Set up gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build project
        run: ./gradlew build


